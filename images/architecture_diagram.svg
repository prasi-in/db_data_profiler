<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 20px Arial, sans-serif; fill: #111827; }
      .small { font: 16px Arial, sans-serif; fill: #374151; }
      .box { fill: #f9fafb; stroke: #4b5563; stroke-width: 2; rx: 18; ry: 18; }
      .accent { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 18; ry: 18; }
      .db { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 18; ry: 18; }
      .persist { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 18; ry: 18; }
      .arrow { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="40" y="45" class="title">Data Profiler Architecture</text>

  <rect x="60" y="120" width="170" height="72" class="box"/>
  <text x="145" y="163" text-anchor="middle" class="label">CLI</text>

  <rect x="310" y="105" width="230" height="100" class="accent"/>
  <text x="425" y="150" text-anchor="middle" class="label">DataProfiler</text>
  <text x="425" y="178" text-anchor="middle" class="small">orchestration, resume, concurrency</text>

  <rect x="620" y="50" width="220" height="70" class="box"/>
  <text x="730" y="92" text-anchor="middle" class="label">SQLiteAdapter</text>

  <rect x="620" y="135" width="220" height="70" class="box"/>
  <text x="730" y="177" text-anchor="middle" class="label">DuckDBAdapter</text>

  <rect x="620" y="220" width="220" height="70" class="box"/>
  <text x="730" y="262" text-anchor="middle" class="label">SnowflakeAdapter</text>

  <rect x="620" y="305" width="220" height="70" class="box"/>
  <text x="730" y="347" text-anchor="middle" class="label">DatabricksAdapter</text>

  <rect x="930" y="145" width="180" height="110" class="db"/>
  <text x="1020" y="185" text-anchor="middle" class="label">Databases</text>
  <text x="1020" y="213" text-anchor="middle" class="small">SQLite / DuckDB</text>
  <text x="1020" y="236" text-anchor="middle" class="small">Snowflake / Databricks</text>

  <rect x="310" y="320" width="230" height="92" class="persist"/>
  <text x="425" y="362" text-anchor="middle" class="label">JSONL Output</text>
  <text x="425" y="390" text-anchor="middle" class="small">persistent state + resumability</text>

  <path d="M230 156 L310 156" class="arrow"/>
  <path d="M540 156 L620 85" class="arrow"/>
  <path d="M540 156 L620 170" class="arrow"/>
  <path d="M540 156 L620 255" class="arrow"/>
  <path d="M540 156 L620 340" class="arrow"/>
  <path d="M840 85 L930 180" class="arrow"/>
  <path d="M840 170 L930 190" class="arrow"/>
  <path d="M840 255 L930 205" class="arrow"/>
  <path d="M840 340 L930 220" class="arrow"/>
  <path d="M425 205 L425 320" class="arrow"/>
</svg>
